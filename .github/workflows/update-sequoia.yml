name: Update Sequoia Portfolio Data

on:
  schedule:
    - cron: "17 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sequoia:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sequoia scraper
        run: python scripts/scrape_sequoia.py

      - name: Commit data updates
        run: |
          if [[ -n "$(git status --porcelain data/sequoia/companies.json data/sequoia/companies.csv)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/sequoia/companies.json data/sequoia/companies.csv
            git commit -m "Update Sequoia portfolio data"
            git push
          else
            echo "No Sequoia data changes to commit."
          fi
