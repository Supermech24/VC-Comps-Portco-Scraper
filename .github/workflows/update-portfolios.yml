name: Update Portfolio Data

on:
  schedule:
    - cron: "17 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-portfolios:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sequoia scraper
        run: python scripts/scrape_sequoia.py

      - name: Run a16z scraper
        run: python scripts/scrape_a16z.py

      - name: Run Index Ventures scraper
        run: python scripts/scrape_index_ventures.py

      - name: Run Accel scraper
        run: python scripts/scrape_accel.py

      - name: Run General Catalyst scraper
        run: python scripts/scrape_general_catalyst.py

      - name: Run 2048 Ventures scraper
        run: python scripts/scrape_2048_ventures.py

      - name: Run Afore scraper
        run: python scripts/scrape_afore.py

      - name: Run Lerer Hippeau scraper
        run: python scripts/scrape_lerer_hippeau.py

      - name: Commit data updates
        run: |
          if [[ -n "$(git status --porcelain data/sequoia/companies.json data/sequoia/companies.csv data/a16z/companies.json data/a16z/companies.csv data/index_ventures/companies.json data/index_ventures/companies.csv data/accel/companies.json data/accel/companies.csv data/general_catalyst/companies.json data/general_catalyst/companies.csv data/2048_ventures/companies.json data/2048_ventures/companies.csv data/afore/companies.json data/afore/companies.csv data/lerer_hippeau/companies.json data/lerer_hippeau/companies.csv)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/sequoia/companies.json data/sequoia/companies.csv data/a16z/companies.json data/a16z/companies.csv data/index_ventures/companies.json data/index_ventures/companies.csv data/accel/companies.json data/accel/companies.csv data/general_catalyst/companies.json data/general_catalyst/companies.csv data/2048_ventures/companies.json data/2048_ventures/companies.csv data/afore/companies.json data/afore/companies.csv data/lerer_hippeau/companies.json data/lerer_hippeau/companies.csv
            git commit -m "Update portfolio data"
            git push
          else
            echo "No portfolio data changes to commit."
          fi
